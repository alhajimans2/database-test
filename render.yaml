services:
  - type: web
    name: tit-database-app
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app -c gunicorn.conf.py
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: APP_ENV
        value: production
      - key: FLASK_DEBUG
        value: "false"
      - key: COOKIE_SECURE
        value: "true"
      - key: TRUST_PROXY
        value: "true"
      - key: CREATE_DEFAULT_ADMIN
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: tit-database
          property: connectionString

databases:
  - name: tit-database
    databaseName: tit_db
    user: tit_db_user
    plan: free
