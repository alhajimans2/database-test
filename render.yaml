services:
  - type: web
    name: tit-database-app
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app -c gunicorn.conf.py
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: APP_ENV
        value: production
      - key: FLASK_DEBUG
        value: "false"
      - key: AUTO_CREATE_DB
        value: "true"
      - key: COOKIE_SECURE
        value: "true"
      - key: TRUST_PROXY
        value: "true"
      - key: DATABASE_URL
        value: sqlite:////tmp/tit_database.db
      - key: DB_SSLMODE
        value: require
      - key: CORS_ORIGINS
        value: https://titdb.netlify.app
      - key: CREATE_DEFAULT_ADMIN
        value: "false"
      - key: SECRET_KEY
        generateValue: true
